# sdlos knowledge packs
# ---------------------
# Loaded by docblocks.py, sca.py, and tidy.py to generate richer
# documentation and more precise warnings.
#
# Sections
# --------
#   naming_patterns          function-name prefix → @brief verb phrase
#   param_taxonomy           parameter name fragment → @param description
#   type_taxonomy            C++ type fragment → human description
#   return_taxonomy          return type fragment → @return text
#   security_functions       unsafe API name → warning text
#   design_patterns          code smell key → advisory text
#   cpp_idioms               recognised idiom tag → note text
#   c_opaque_handle_prefixes type-name prefixes that identify C API opaque
#                            handles — raw pointer params of these types are
#                            suppressed from raw_ptr_param SCA findings because
#                            the C API itself does not offer const-qualified
#                            variants and ownership is managed by the library.

