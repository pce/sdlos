  "uint32_t":           "Non-negative integer result"

# Security-sensitive functions
# Used by SCA to emit @warning tags and issue reports.
security_functions:
  strcpy:    "Buffer overflow — destination size is not checked; use strncpy, strlcpy, or std::string"
  strncpy:   "Potential truncation and missing NUL terminator; prefer strlcpy or std::string"
  strcat:    "Buffer overflow — destination size is not checked; use strncat, strlcat, or std::string::append"
  strncat:   "Potential truncation; prefer strlcat or std::string::append"
  sprintf:   "Buffer overflow — destination size is not checked; use snprintf or std::format"
  vsprintf:  "Buffer overflow — destination size is not checked; use vsnprintf or std::vformat"
  gets:      "Removed in C11 — unbounded input; use fgets or std::getline"
  scanf:     "Unchecked input width; use explicit-width specifiers or std::cin with validation"
  sscanf:    "Unchecked input; prefer std::from_chars or std::istringstream"
  fscanf:    "Unchecked input width; use explicit-width specifiers"
  atoi:      "No error detection — silently returns 0 on failure; use std::stoi or std::from_chars"
  atol:      "No error detection; use std::stol or std::from_chars"
  atof:      "No error detection; use std::stod or std::from_chars"
  strtol:    "Verify errno and endptr after call; prefer std::from_chars in C++17+"
  strtod:    "Verify errno and endptr after call; prefer std::from_chars in C++17+"
  system:    "OS command injection risk — sanitise all input before use or avoid entirely"
  popen:     "OS command injection risk — sanitise all input before use"
  execl:     "OS command injection risk — validate and sanitise all arguments"
  execv:     "OS command injection risk — validate and sanitise all arguments"
  getenv:    "Environment variable may be attacker-controlled; validate the returned value"
  rand:      "Cryptographically weak PRNG — use std::mt19937 for simulation or OS RNG for security"
  srand:     "Seeding a cryptographically weak PRNG — use OS entropy source for security"
  malloc:    "Manual heap allocation — prefer std::vector, std::unique_ptr, or a frame arena"
  calloc:    "Manual heap allocation — prefer std::vector or std::unique_ptr"
  realloc:   "Manual heap reallocation — prefer std::vector::resize"
  free:      "Manual deallocation — prefer RAII, std::unique_ptr, or a frame arena"
  memcpy:    "Bounds not checked by the API — verify destination capacity before calling"
  memmove:   "Bounds not checked by the API — verify destination capacity before calling"
  memset:    "Ensure buffer size is correct; consider std::fill or value-initialisation"
  strlen:    "No upper bound — ensure the input is always NUL-terminated"
  strdup:    "Returns heap-allocated string requiring manual free(); use std::string instead"
  strtok:    "Not thread-safe and modifies its input; use std::string tokenisation or std::ranges"
  printf:    "Format string must be a compile-time literal to prevent format-string attacks"
  fprintf:   "Format string must be a compile-time literal to prevent format-string attacks"

# Design-pattern advisories
# Emitted as @warning or @note tags by the docblock generator or SCA.
# C API opaque handle prefixes
# Type names (or their struct-tag equivalents) whose pointee starts with one of
# these prefixes are skipped by the raw_ptr_param SCA check.  These are C
# library handle types where:
#   - The C API owns and manages object lifetime.
#   - The C API never exposes a const-qualified handle variant.
#   - Passing non-const* is the documented, intended calling convention.
# Add entries whenever a new C library boundary is introduced to the codebase.
c_opaque_handle_prefixes:
  # SDL3 — GPU, window, renderer, audio, camera, I/O, mutex, …
  - SDL_
  # Vulkan — VkDevice, VkBuffer, VkImage, VkQueue, VkPipeline, …
  - Vk
  # OpenXR — XrSession, XrInstance, XrSpace, …
  - Xr
  # POSIX / libc opaque handles — FILE, DIR, …
  - FILE
  - DIR
  # freetype2 — FT_Library, FT_Face, …
  - FT_
  # HarfBuzz — hb_font_t, hb_buffer_t, …
  - hb_
  # plutovg / plutosvg
  - plutovg_
  - plutosvg_

design_patterns:
  raw_pointer_param:
    severity: warning
    text: "Raw pointer parameter — ownership is ambiguous; consider std::span (non-owning view), std::unique_ptr (transfer), or const T* (borrow)"

  non_const_ref_param:
    severity: note
    text: "Non-const reference output parameter — consider returning std::expected or std::optional instead"

  new_expression:
    severity: warning
    text: "Manual heap allocation with new — prefer std::make_unique or std::make_shared to avoid resource leaks"

  delete_expression:
    severity: warning
    text: "Manual deallocation with delete — prefer RAII wrappers or smart pointers"

  mutable_global:
    severity: warning
    text: "Mutable global / static variable — initialisation order is undefined across translation units; use Meyers singleton or dependency injection"

  implicit_bool_conversion:
    severity: note
    text: "Implicit conversion to bool — add an explicit cast or comparison to make intent clear"

  unchecked_return:
    severity: warning
    text: "Return value discarded — this function signals errors through its return value; check it or use [[nodiscard]]"

  missing_const:
    severity: note
    text: "Variable or parameter could be declared const — express immutability explicitly"

  missing_nodiscard:
    severity: note
    text: "Function returns a value that callers should not silently discard — consider [[nodiscard]]"

  signed_unsigned_compare:
    severity: warning
    text: "Signed/unsigned comparison — potential undefined behaviour on overflow; cast explicitly"

  c_style_cast:
    severity: note
    text: "C-style cast — replace with static_cast, reinterpret_cast, or const_cast to express intent"

  throwing_in_destructor:
    severity: warning
    text: "Exception thrown from a destructor — this will call std::terminate during stack unwinding; catch and log instead"

  blocking_in_render_thread:
    severity: warning
    text: "Blocking call detected on the render thread — this will cause frame drops; offload to a worker thread"

  raw_array_decay:
    severity: note
    text: "Array decays to pointer — prefer std::array or std::span for bounds-safe access"

# C++ idiom annotations
# Used to annotate recognised patterns with positive notes in docblocks.
cpp_idioms:
  raii:             "Follows RAII — resource is released automatically in the destructor"
  factory:          "Factory function — the caller takes ownership of the returned object"
  builder:          "Builder pattern — call build() to finalise and obtain the constructed object"
  singleton:        "Singleton accessor — returns the unique instance; construction is lazy and thread-safe"
  observer:         "Observer registration — the subscriber will be notified until it is unregistered"
  crtp:             "CRTP base — do not use this class directly; derive from it with the subclass as the template argument"
  pimpl:            "Pimpl idiom — the private implementation is forward-declared to minimise compile-time dependencies"
  type_erasure:     "Type-erased interface — the concrete type is hidden behind a value-semantic wrapper"
  expected_result:  "Returns std::expected — always check for error with .has_value() or .error() before using the value"
  coroutine:        "C++20 coroutine — must be co_awaited; ensure the coroutine frame outlives all suspension points"
