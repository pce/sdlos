# Return type taxonomy
# Matched as a case-sensitive substring of the return type spelling.
# Value is the generated @return sentence (empty string → omit @return).
return_taxonomy:
  "void":               ""
  "bool":               "true on success, false on failure"
  "std::expected":      "The computed value on success, or an error string on failure"
  "std::optional":      "The value if present, std::nullopt otherwise"
  "std::unique_ptr":    "Owning pointer to the created object, or nullptr on failure"
  "std::shared_ptr":    "Shared pointer to the object, or nullptr on failure"
  "std::string":        "UTF-8 string result"
  "std::string_view":   "Non-owning view of the result (lifetime tied to the source)"
  "std::vector":        "Collection of results"
  "std::span":          "Non-owning view over the result range (lifetime tied to the source)"
  "NodeHandle":         "Handle to the node, or k_null_handle on failure"
  "SlotID":             "Slot identifier, or k_null_slot if allocation failed"
