<!DOCTYPE html>
<!-- assets/web/shell.html
     Emscripten HTML shell for sdlos WASM builds.
     {{{ SCRIPT }}} is replaced by Emscripten with the generated JS loader.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sdlos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      /* SDL3 sets the canvas size; CSS stretches it to fill the viewport. */
      image-rendering: pixelated;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
      color: #aaa; font-family: system-ui, sans-serif; font-size: 14px;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333; border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading sdlos…</span>
  </div>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <script>
    var Module = {
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost',
          function(e) { alert('WebGL context lost. Reload the page.'); e.preventDefault(); },
          false);
        return canvas;
      })(),

      onRuntimeInitialized: function() {
        var el = document.getElementById('loading');
        if (el) el.classList.add('hidden');
      },

      print:    function(text) { console.log(text); },
      printErr: function(text) { console.error(text); },
    };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
